name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build packages
        run: go build ./...

      - name: Build bridge binary
        run: go build -o ./autoscan-bridge ./cmd/autoscan-bridge

      - name: Verify bridge version output
        run: ./autoscan-bridge version
