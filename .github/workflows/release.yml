name: Engine Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      AUTOSCAN_BOT_PAT: ${{ secrets.AUTOSCAN_BOT_PAT }}
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false

      - name: Dispatch engine release to autOScan (TUI)
        if: ${{ env.AUTOSCAN_BOT_PAT != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.AUTOSCAN_BOT_PAT }}
          repository: autoscan-lab/autOScan
          event-type: engine_release
          client-payload: '{"engine_tag":"${{ github.ref_name }}"}'

      - name: Downstream dispatch not configured
        if: ${{ env.AUTOSCAN_BOT_PAT == '' }}
        run: echo "::warning::AUTOSCAN_BOT_PAT is not set; skipping downstream bump PR dispatch."
