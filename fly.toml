# fly.toml app configuration file generated for autoscan-engine-service on 2026-04-18T20:23:27+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'autoscan-engine-service'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'autoscan_engine_data'
  destination = '/data'
  processes = ['app']

[http_service]
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # Long-lived terminal WebSockets each occupy a slot, so the ceiling leaves
  # room for grading requests alongside open terminals (engine caps terminal
  # sessions at 5 itself).
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  # 2 shared CPUs on purpose: the engine sizes its compile/scan worker pools to
  # runtime.NumCPU(), so extra vCPUs just oversubscribe weak shared cores and
  # thrash (gcc + valgrind). 2 is the sweet spot for bursty C grading on small
  # labs. RAM stays at 2gb for parallel-valgrind headroom (negligible cost under
  # scale-to-zero).
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
